<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Criar Conta — GrupoSI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%); min-height: 100vh; }
        .card-auth { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
        .brand-icon { width: 56px; height: 56px; background: #2563eb; border-radius: 14px;
                      display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
        .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 .2rem rgba(37,99,235,.25); }
        .btn-primary { background: #2563eb; border-color: #2563eb; }
        .btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
        .input-group-text { background: #f8fafc; border-right: none; }
        .form-control { border-left: none; }
        .form-control.is-invalid { border-left: none; border-color: #dc3545; }
        .invalid-feedback { font-size: .8rem; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">
<div class="container" style="max-width: 460px;">
    <div class="card card-auth">
        <div class="card-body p-4 p-md-5">
            <div class="brand-icon">
                <i class="bi bi-person-plus text-white fs-4"></i>
            </div>
            <h4 class="text-center fw-bold text-dark mb-1">Criar nova conta</h4>
            <p class="text-center text-muted small mb-4">Preencha os campos abaixo para se registrar</p>

            <div th:if="${erroGeral}" class="alert alert-danger d-flex align-items-center gap-2 py-2">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${erroGeral}"></span>
            </div>

            <form th:action="@{/register}" th:object="${user}" method="post" novalidate>
                <div class="mb-3">
                    <label for="name" class="form-label fw-semibold small text-dark">Nome completo</label>
                    <div class="input-group" th:classappend="${#fields.hasErrors('name')} ? 'has-validation'">
                        <span class="input-group-text"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" id="name" th:field="*{name}"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                               class="form-control" placeholder="João Silva"
                               minlength="3" maxlength="100" required/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold small text-dark">E-mail</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" id="email" th:field="*{email}"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                               class="form-control" placeholder="seu@email.com"
                               maxlength="100" required/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold small text-dark">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" id="password" th:field="*{password}"
                               th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                               class="form-control" placeholder="Mínimo 6 caracteres"
                               minlength="6" required/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>
                    <div class="form-text text-muted"><i class="bi bi-shield-lock me-1"></i>A senha deve ter no mínimo 6 caracteres.</div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                    <i class="bi bi-person-check me-2"></i>Criar conta
                </button>
            </form>

            <hr class="my-4"/>
            <p class="text-center text-muted small mb-0">
                Já tem uma conta?
                <a th:href="@{/login}" class="text-primary fw-semibold text-decoration-none">Fazer login</a>
            </p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
