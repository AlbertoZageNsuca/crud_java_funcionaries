spring.application.name=crudApp

#url do banco
spring.datasource.url=jdbc:mysql://localhost:3306/db_crud_funcionarios?createDatabaseIfNotExist=true&serverTimezone=UTC

# 2. Credenciais
spring.datasource.username=root
spring.datasource.password=

# 3. Driver do MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. EstratÈgia do Hibernate (Update cria as tabelas automaticamente se elas n„o existirem)
spring.jpa.hibernate.ddl-auto=update

# 5. Mostrar o SQL no console (˙til para aprender e debugar)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
