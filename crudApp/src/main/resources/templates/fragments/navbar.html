<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">
            <i class="bi bi-building-fill-gear fs-5"></i>
            <span>Sistema de Gestão de Funcionários</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${#httpServletRequest.requestURI.startsWith('/funcionarios')} ? 'active'" th:href="@{/funcionarios}">
                        <i class="bi bi-people-fill me-1"></i>Funcionários
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${#httpServletRequest.requestURI.startsWith('/departamentos')} ? 'active'" th:href="@{/departamentos}">
                        <i class="bi bi-diagram-3-fill me-1"></i>Departamentos
                    </a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-3">
        <span class="text-white-50 small d-none d-md-inline">
          <i class="bi bi-person-circle me-1"></i>
          <span sec:authentication="name">Usuário</span>
        </span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-box-arrow-right me-1"></i>Sair
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
