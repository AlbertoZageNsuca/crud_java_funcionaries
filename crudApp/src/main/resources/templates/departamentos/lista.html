<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Departamentos — GrupoSI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body { background: #f0f4f8; }
    .sidebar { width: 240px; min-height: 100vh; background: #1e3a5f; position: fixed; top: 0; left: 0; z-index: 100; }
    .sidebar .brand { padding: 1.5rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,.1); }
    .sidebar .nav-link { color: rgba(255,255,255,.75); padding: .6rem 1.25rem; border-radius: 8px;
                          margin: .1rem .75rem; transition: all .2s; font-size: .9rem; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,.15); color: #fff; }
    .main-content { margin-left: 240px; }
    .topbar { background: #fff; border-bottom: 1px solid #e2e8f0; padding: .75rem 2rem; }
    .page-body { padding: 2rem; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .card-header { background: #fff; border-bottom: 1px solid #f1f5f9; border-radius: 12px 12px 0 0 !important; }
    .table th { font-size: .78rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em;
                 color: #64748b; background: #f8fafc; border-bottom: 2px solid #e2e8f0; }
    .table td { vertical-align: middle; font-size: .9rem; }
    .btn-action { width: 32px; height: 32px; padding: 0; border-radius: 8px;
                   display: inline-flex; align-items: center; justify-content: center; }
    .form-control:focus, .form-select:focus { border-color: #2563eb; box-shadow: 0 0 0 .2rem rgba(37,99,235,.2); }
    .btn-primary { background: #2563eb; border-color: #2563eb; }
    .btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
    @media(max-width:768px) { .sidebar { display: none; } .main-content { margin-left: 0; } }
  </style>
</head>
<body>

<div class="sidebar d-flex flex-column">
  <div class="brand">
    <div class="d-flex align-items-center gap-2">
      <div style="width:36px;height:36px;background:#2563eb;border-radius:10px;display:flex;align-items:center;justify-content:center;">
        <i class="bi bi-building-fill-gear text-white"></i>
      </div>
      <span class="text-white fw-bold fs-6">GrupoSI</span>
    </div>
  </div>
  <nav class="flex-grow-1 pt-2">
    <ul class="nav flex-column">
      <li class="nav-item">
        <a class="nav-link" th:href="@{/funcionarios}">
          <i class="bi bi-people-fill me-2"></i>Funcionários
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link active" th:href="@{/departamentos}">
          <i class="bi bi-diagram-3-fill me-2"></i>Departamentos
        </a>
      </li>
    </ul>
  </nav>
  <div class="p-3 border-top" style="border-color: rgba(255,255,255,.1) !important;">
    <div class="d-flex align-items-center gap-2 mb-2">
      <div style="width:36px;height:36px;background:#1d4ed8;border-radius:50%;display:flex;align-items:center;justify-content:center;">
        <i class="bi bi-person-fill text-info"></i>
      </div>
      <span class="text-white-50 small text-truncate" sec:authentication="name">Usuário</span>
    </div>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="btn btn-sm w-100" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.75);border:none;">
        <i class="bi bi-box-arrow-right me-1"></i>Sair
      </button>
    </form>
  </div>
</div>

<div class="main-content">
  <div class="topbar d-flex align-items-center justify-content-between">
    <div>
      <h5 class="mb-0 fw-bold text-dark">Departamentos</h5>
      <small class="text-muted">Gerencie os departamentos da empresa</small>
    </div>
    <button class="btn btn-primary btn-sm px-3" data-bs-toggle="modal" data-bs-target="#modalNovoDepartamento">
      <i class="bi bi-plus-lg me-1"></i>Novo Departamento
    </button>
  </div>

  <div class="page-body">
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible d-flex align-items-center gap-2 mb-3">
      <i class="bi bi-check-circle-fill"></i>
      <span th:text="${sucesso}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible d-flex align-items-center gap-2 mb-3">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <span th:text="${erro}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
      <div class="card-header d-flex align-items-center p-3">
        <span class="fw-semibold text-dark">
          <i class="bi bi-diagram-3 me-2 text-primary"></i>
          Total: <span th:text="${#lists.size(departamentos)}" class="text-primary fw-bold">0</span> departamento(s)
        </span>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
            <tr>
              <th class="ps-4">#</th>
              <th>Nome do Departamento</th>
              <th>Funcionários</th>
              <th class="text-end pe-4">Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(departamentos)}">
              <td colspan="4" class="text-center py-5 text-muted">
                <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                Nenhum departamento cadastrado ainda.
              </td>
            </tr>
            <tr th:each="d, i : ${departamentos}">
              <td class="ps-4 text-muted" th:text="${i.count}">1</td>
              <td>
                <div class="d-flex align-items-center gap-2">
                  <div style="width:34px;height:34px;background:#eff6ff;border-radius:8px;display:flex;align-items:center;justify-content:center;">
                    <i class="bi bi-diagram-3 text-primary" style="font-size:.85rem;"></i>
                  </div>
                  <span class="fw-semibold" th:text="${d.name}">Nome</span>
                </div>
              </td>
              <td>
                  <span class="badge bg-light text-secondary rounded-pill px-2"
                        th:text="${#lists.size(d.funcionaryList)} + ' funcionário(s)'">0</span>
              </td>
              <td class="text-end pe-4">
                <a th:href="@{/departamentos/{id}/editar(id=${d.id})}"
                   class="btn btn-action btn-outline-primary me-1" title="Editar">
                  <i class="bi bi-pencil-fill" style="font-size:.75rem;"></i>
                </a>
                <form th:action="@{/departamentos/{id}/excluir(id=${d.id})}" method="post" class="d-inline"
                      onsubmit="return confirm('Confirma a exclusão deste departamento?')">
                  <button type="submit" class="btn btn-action btn-outline-danger" title="Excluir">
                    <i class="bi bi-trash-fill" style="font-size:.75rem;"></i>
                  </button>
                </form>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Novo Departamento -->
<div class="modal fade" id="modalNovoDepartamento" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" style="max-width:480px;">
    <div class="modal-content" style="border-radius:16px;border:none;">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold">
          <i class="bi bi-diagram-3-fill text-primary me-2"></i>Novo Departamento
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form th:action="@{/departamentos/novo}" th:object="${novoDepartamento}" method="post" novalidate>
        <div class="modal-body px-4 py-3">
          <div class="mb-3">
            <label class="form-label fw-semibold small">Nome do Departamento <span class="text-danger">*</span></label>
            <input type="text" th:field="*{name}"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                   class="form-control" placeholder="Ex: Tecnologia da Informação"
                   minlength="2" maxlength="100" required/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
          </div>
        </div>
        <div class="modal-footer border-0 pt-0 px-4">
          <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary px-4">
            <i class="bi bi-floppy-fill me-2"></i>Salvar
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Modal Editar Departamento -->
<div class="modal fade" id="modalEditarDepartamento" tabindex="-1" aria-hidden="true"
     th:if="${departamentoEdit != null}">
  <div class="modal-dialog modal-dialog-centered" style="max-width:480px;">
    <div class="modal-content" style="border-radius:16px;border:none;">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold">
          <i class="bi bi-pencil-fill text-primary me-2"></i>Editar Departamento
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form th:action="@{/departamentos/{id}/editar(id=${departamentoEdit.id})}"
            th:object="${departamentoEdit}" method="post" novalidate>
        <div class="modal-body px-4 py-3">
          <div class="mb-3">
            <label class="form-label fw-semibold small">Nome do Departamento <span class="text-danger">*</span></label>
            <input type="text" th:field="*{name}"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                   class="form-control" minlength="2" maxlength="100" required/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
          </div>
        </div>
        <div class="modal-footer border-0 pt-0 px-4">
          <a th:href="@{/departamentos}" class="btn btn-light px-4">Cancelar</a>
          <button type="submit" class="btn btn-primary px-4">
            <i class="bi bi-floppy-fill me-2"></i>Atualizar
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
  /*<![CDATA[*/
  const abrirModalNovo = /*[[${abrirModalNovo}]]*/ false;
  const abrirModalEditar = /*[[${abrirModalEditar}]]*/ null;

  document.addEventListener('DOMContentLoaded', function () {
    if (abrirModalNovo) {
      new bootstrap.Modal(document.getElementById('modalNovoDepartamento')).show();
    }
    if (abrirModalEditar) {
      const el = document.getElementById('modalEditarDepartamento');
      if (el) new bootstrap.Modal(el).show();
    }
  });
  /*]]>*/
</script>
</body>
</html>
