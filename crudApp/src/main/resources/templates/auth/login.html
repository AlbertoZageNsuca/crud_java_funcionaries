<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — GrupoSI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }

        body {
            min-height: 100vh; margin: 0;
            display: flex; align-items: stretch;
        }

        .left-panel {
            flex: 1; display: none;
            background: linear-gradient(145deg, #0f2544 0%, #1e3a5f 50%, #2563eb 100%);
            align-items: center; justify-content: center; flex-direction: column;
            padding: 3rem; position: relative; overflow: hidden;
        }
        @media(min-width:992px) { .left-panel { display: flex; } }

        .left-panel::before {
            content: ''; position: absolute; inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .left-brand-icon {
            width: 72px; height: 72px; background: rgba(255,255,255,.12);
            border-radius: 22px; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: #fff; margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,.15);
            box-shadow: 0 8px 32px rgba(0,0,0,.2);
        }
        .feature-item {
            display: flex; align-items: center; gap: .75rem;
            color: rgba(255,255,255,.75); font-size: .9rem; margin-bottom: .75rem;
        }
        .feature-item i { color: #60a5fa; font-size: 1.1rem; }

        .right-panel {
            width: 100%; max-width: 480px;
            display: flex; align-items: center; justify-content: center;
            padding: 2rem; background: #f8fafc;
        }
        @media(min-width:992px) { .right-panel { min-height: 100vh; } }

        .login-card {
            width: 100%; background: #fff; border-radius: 20px;
            padding: 2.5rem 2rem;
            box-shadow: 0 4px 32px rgba(0,0,0,.08);
            border: 1px solid #e2e8f0;
        }
        .login-icon {
            width: 52px; height: 52px; background: #eff6ff; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            color: #2563eb; font-size: 1.4rem; margin: 0 auto 1.25rem;
        }
        .form-label { font-size: .8rem; font-weight: 600; color: #374151; margin-bottom: .35rem; }
        .input-group-text {
            background: #f8fafc; border: 1.5px solid #e5e7eb;
            border-right: none; border-radius: 10px 0 0 10px; color: #94a3b8;
        }
        .form-control {
            border: 1.5px solid #e5e7eb; border-left: none;
            border-radius: 0 10px 10px 0; font-size: .88rem; padding: .6rem .85rem;
        }
        .form-control:focus {
            border-color: #2563eb; box-shadow: none;
            outline: none;
        }
        .form-control:focus + .input-group-text,
        .input-group:focus-within .input-group-text {
            border-color: #2563eb;
        }
        .btn-login {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #fff; border: none; border-radius: 10px;
            font-weight: 600; padding: .7rem; font-size: .95rem;
            box-shadow: 0 4px 12px rgba(37,99,235,.3);
            transition: all .2s;
        }
        .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(37,99,235,.4); color: #fff; }
        .alert { border: none; border-radius: 10px; font-size: .85rem; }
        .alert-danger { background: #fef2f2; color: #dc2626; }
        .alert-success { background: #f0fdf4; color: #15803d; }
        .alert-info { background: #eff6ff; color: #2563eb; }
        .divider { display: flex; align-items: center; gap: .75rem; color: #94a3b8; font-size: .8rem; margin: 1.25rem 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
    </style>
</head>
<body>

<!-- Painel esquerdo -->
<div class="left-panel">
    <div style="position:relative;z-index:1;text-align:center;max-width:360px;">
        <div class="left-brand-icon mx-auto"><i class="bi bi-building-fill-gear"></i></div>
        <h2 class="text-white fw-bold mb-2" style="font-size:1.75rem;">SGFD</h2>
        <p class="mb-4" style="color:rgba(255,255,255,.6);font-size:.95rem;line-height:1.6;">
            Sistema integrado de gestão de funcionários e departamentos.
        </p>
        <div class="text-start">
            <div class="feature-item"><i class="bi bi-people-fill"></i> Gestão completa de funcionários</div>
            <div class="feature-item"><i class="bi bi-diagram-3-fill"></i> Organização por departamentos</div>
            <div class="feature-item"><i class="bi bi-file-earmark-pdf-fill"></i> Exportação de relatórios PDF</div>
            <div class="feature-item"><i class="bi bi-shield-lock-fill"></i> Acesso seguro por utilizador</div>
        </div>
    </div>
</div>

<!-- Painel direito -->
<div class="right-panel">
    <div class="login-card">
        <div class="login-icon"><i class="bi bi-building-fill-gear"></i></div>
        <h4 class="text-center fw-bold text-dark mb-1">Bem-vindo de volta</h4>
        <p class="text-center text-muted mb-4" style="font-size:.85rem;">Faça login para aceder ao sistema</p>

        <div th:if="${erroLogin}" class="alert alert-danger d-flex align-items-center gap-2 py-2 mb-3">
            <i class="bi bi-exclamation-triangle-fill"></i><span th:text="${erroLogin}"></span>
        </div>
        <div th:if="${sucesso}" class="alert alert-success d-flex align-items-center gap-2 py-2 mb-3">
            <i class="bi bi-check-circle-fill"></i><span th:text="${sucesso}"></span>
        </div>
        <div th:if="${mensagemLogout}" class="alert alert-info d-flex align-items-center gap-2 py-2 mb-3">
            <i class="bi bi-info-circle-fill"></i><span th:text="${mensagemLogout}"></span>
        </div>

        <form th:action="@{/login}" method="post" novalidate>
            <div class="mb-3">
                <label class="form-label">E-mail</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="form-control"
                           placeholder="seu@email.com" required autocomplete="email"/>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control"
                           placeholder="••••••••" required autocomplete="current-password"/>
                </div>
            </div>
            <button type="submit" class="btn btn-login w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
            </button>
        </form>

        <div class="divider">ou</div>
        <p class="text-center text-muted mb-0" style="font-size:.85rem;">
            Não tem conta?
            <a th:href="@{/register}" class="text-primary fw-semibold text-decoration-none">Criar conta</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
