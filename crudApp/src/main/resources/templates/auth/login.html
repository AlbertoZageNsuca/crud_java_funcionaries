<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — GrupoSI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%); min-height: 100vh; }
        .card-auth { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
        .brand-icon { width: 56px; height: 56px; background: #2563eb; border-radius: 14px;
                      display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
        .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 .2rem rgba(37,99,235,.25); }
        .btn-primary { background: #2563eb; border-color: #2563eb; }
        .btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
        .input-group-text { background: #f8fafc; border-right: none; }
        .form-control { border-left: none; }
        .form-control.is-invalid { border-left: none; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">
<div class="container" style="max-width: 420px;">
    <div class="card card-auth">
        <div class="card-body p-4 p-md-5">
            <div class="brand-icon">
                <i class="bi bi-building-fill-gear text-white fs-4"></i>
            </div>
            <h4 class="text-center fw-bold text-dark mb-1">Bem-vindo de volta</h4>
            <p class="text-center text-muted small mb-4">Faça login para acessar o sistema</p>

            <div th:if="${erroLogin}" class="alert alert-danger d-flex align-items-center gap-2 py-2" role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${erroLogin}"></span>
            </div>
            <div th:if="${sucesso}" class="alert alert-success d-flex align-items-center gap-2 py-2" role="alert">
                <i class="bi bi-check-circle-fill"></i>
                <span th:text="${sucesso}"></span>
            </div>
            <div th:if="${mensagemLogout}" class="alert alert-info d-flex align-items-center gap-2 py-2" role="alert">
                <i class="bi bi-info-circle-fill"></i>
                <span th:text="${mensagemLogout}"></span>
            </div>

            <form th:action="@{/login}" method="post" novalidate>
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold small text-dark">E-mail</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" id="email" name="email" class="form-control"
                               placeholder="seu@email.com" required autocomplete="email"/>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold small text-dark">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" id="password" name="password" class="form-control"
                               placeholder="••••••••" required autocomplete="current-password"/>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                </button>
            </form>

            <hr class="my-4"/>
            <p class="text-center text-muted small mb-0">
                Não tem uma conta?
                <a th:href="@{/register}" class="text-primary fw-semibold text-decoration-none">Criar conta</a>
            </p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
